<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHW - FUNKYな日本</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 基本設定：墨色背景 */
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #0c0c0c;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 英語用のフォント */
        .font-en {
            font-family: 'Oswald', sans-serif;
        }
        
        /* 金箔風グラデーションテキスト */
        .text-gold {
            background: linear-gradient(135deg, #C5A059 0%, #FDF4D2 25%, #C5A059 50%, #FDF4D2 75%, #A17B34 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 背景キャンバス */
        #gold-dust-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        /* すりガラス風パネル */
        .glass-panel {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(197, 160, 89, 0.15);
        }

        /* カード画像のホバーエフェクト用 */
        .card-image-container {
            overflow: hidden;
        }
        .card-image-container .bg-overlay {
            transition: all 0.7s ease;
        }
        .card:hover .card-image-container .bg-overlay {
            transform: scale(1.05);
            background-color: rgba(197, 160, 89, 0.2);
        }
        .card:hover .card-emoji {
            transform: scale(1.1);
            opacity: 1;
        }

        /* 全体の縦スクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0c0c0c; }
        ::-webkit-scrollbar-thumb { background: #5a4b2c; }
        ::-webkit-scrollbar-thumb:hover { background: #8b7345; }

        /* コレクション部分の横スクロールバーを非表示にする */
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }
    </style>
</head>
<body class="antialiased selection:bg-[#C5A059] selection:text-black">
    
    <!-- 金粉背景 -->
    <canvas id="gold-dust-canvas"></canvas>

    <!-- ヘッダー -->
    <header class="fixed w-full z-50 transition-all duration-300 glass-panel border-b-0">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <!-- ロゴとUPDATE時間 -->
            <div class="flex items-baseline space-x-3 sm:space-x-4">

                <div class="text-[9px] sm:text-[10px] tracking-widest text-gray-400 font-en opacity-80">JST 00:00 UPDATE</div>
            </div>
            
            <!-- 🍙リンク -->
            <a href="https://funkyhotdog.com/world" class="text-2xl hover:scale-110 transition-transform duration-300" title="World">
                🍙

    </header>

    <!-- メインビジュアル -->

                FUNKYな日本

            <a href="#collection" class="inline-block px-8 py-3 sm:px-10 sm:py-3 border border-gold text-[#C5A059] hover:bg-[#C5A059]/10 transition-all duration-500 tracking-[0.2em] sm:tracking-[0.3em] text-xl sm:text-2xl font-bold">

                            <button class="w-full text-left px-3 py-2.5 flex items-center space-x-2 hover:bg-[#1a1814] text-sm text-gray-200 transition-colors font-en tracking-wider">

                    <div class="bg-overlay absolute inset-0 bg-gradient-to-b from-transparent to-[#C5A059]/10"></div>

                    </div>
                </div>
                <!-- 下部コンテンツ -->
                <div class="text-center flex flex-col flex-grow justify-end">
                    <p class="text-white text-lg font-bold tracking-[0.2em] mb-6 drop-shadow-md">漢字練習帳</p>
                    <a href="#" class="inline-block w-full py-3 border border-[#5a4b2c] text-[#C5A059] text-sm tracking-[0.3em] font-bold rounded-full hover:bg-[#C5A059]/10 transition-all duration-300">

                    </a>
                </div>
            </div>

            <!-- カード 2 -->
            <div class="card snap-center flex-none w-[80vw] max-w-[340px] relative glass-panel p-5 sm:p-6 flex flex-col rounded-2xl border border-[#2a2315] hover:border-[#C5A059]/50 transition-colors duration-500">
                <div class="flex justify-between items-center mb-5 relative z-20">
                    <h2 class="text-xl sm:text-2xl font-bold tracking-widest text-gold drop-shadow-sm">本日の一景</h2>
                    <div class="relative">
                        <button class="share-btn text-gray-400 hover:text-[#C5A059] transition-colors p-2 focus:outline-none rounded-full hover:bg-white/5">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                        </button>
                        <div class="share-menu hidden absolute right-0 top-full mt-2 w-36 bg-[#111] border border-[#2a2315] rounded-xl shadow-2xl overflow-hidden transform origin-top-right transition-all z-30">
                            <button class="copy-link-btn w-full text-left px-3 py-2.5 flex items-center space-x-2 hover:bg-[#1a1814] text-sm text-gray-200 transition-colors font-en tracking-wider">
                                <span class="icon">🔗</span> <span class="text">Copy Link</span>
                            </button>
                            <div class="h-px bg-[#2a2315] w-full"></div>
                            <button class="w-full text-left px-3 py-2.5 flex items-center space-x-2 hover:bg-[#1a1814] text-sm text-gray-200 transition-colors font-en tracking-wider">
                                <span>𝕏</span> <span>Share on X</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-image-container w-full aspect-[5/4] rounded-xl border border-[#2a2315] mb-6 relative bg-[#080808]">
                    <div class="bg-overlay absolute inset-0 bg-gradient-to-b from-transparent to-[#C5A059]/10"></div>
                    <div class="absolute inset-0 flex items-center justify-center flex-col">
                        <span class="card-emoji text-6xl opacity-80 transition-all duration-500 drop-shadow-[0_0_15px_rgba(197,160,89,0.5)]">🏯</span>
                    </div>
                </div>
                <div class="text-center flex flex-col flex-grow justify-end">
                    <p class="text-white text-lg font-bold tracking-[0.2em] mb-6 drop-shadow-md">歴史の授業</p>
                    <a href="#" class="inline-block w-full py-3 border border-[#5a4b2c] text-[#C5A059] text-sm tracking-[0.3em] font-bold rounded-full hover:bg-[#C5A059]/10 transition-all duration-300">
                        飛び込む
                    </a>
                </div>
            </div>

            <!-- カード 3 -->
            <div class="card snap-center flex-none w-[80vw] max-w-[340px] relative glass-panel p-5 sm:p-6 flex flex-col rounded-2xl border border-[#2a2315] hover:border-[#C5A059]/50 transition-colors duration-500">
                <div class="flex justify-between items-center mb-5 relative z-20">
                    <h2 class="text-xl sm:text-2xl font-bold tracking-widest text-gold drop-shadow-sm">本日の一作</h2>
                    <div class="relative">
                        <button class="share-btn text-gray-400 hover:text-[#C5A059] transition-colors p-2 focus:outline-none rounded-full hover:bg-white/5">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                        </button>
                        <div class="share-menu hidden absolute right-0 top-full mt-2 w-36 bg-[#111] border border-[#2a2315] rounded-xl shadow-2xl overflow-hidden transform origin-top-right transition-all z-30">
                            <button class="copy-link-btn w-full text-left px-3 py-2.5 flex items-center space-x-2 hover:bg-[#1a1814] text-sm text-gray-200 transition-colors font-en tracking-wider">
                                <span class="icon">🔗</span> <span class="text">Copy Link</span>
                            </button>
                            <div class="h-px bg-[#2a2315] w-full"></div>
                            <button class="w-full text-left px-3 py-2.5 flex items-center space-x-2 hover:bg-[#1a1814] text-sm text-gray-200 transition-colors font-en tracking-wider">
                                <span>𝕏</span> <span>Share on X</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-image-container w-full aspect-[5/4] rounded-xl border border-[#2a2315] mb-6 relative bg-[#080808]">
                    <div class="bg-overlay absolute inset-0 bg-gradient-to-b from-transparent to-[#C5A059]/10"></div>
                    <div class="absolute inset-0 flex items-center justify-center flex-col">
                        <span class="card-emoji text-6xl opacity-80 transition-all duration-500 drop-shadow-[0_0_15px_rgba(197,160,89,0.5)]">🎨</span>
                    </div>
                </div>
                <div class="text-center flex flex-col flex-grow justify-end">
                    <p class="text-white text-lg font-bold tracking-[0.2em] mb-6 drop-shadow-md">図工室</p>
                    <a href="#" class="inline-block w-full py-3 border border-[#5a4b2c] text-[#C5A059] text-sm tracking-[0.3em] font-bold rounded-full hover:bg-[#C5A059]/10 transition-all duration-300">
                        溶け込む
                    </a>
                </div>
            </div>
            
            <!-- スクロール用の余白 -->
            <div class="snap-center flex-none w-2 sm:w-4"></div>

        </div>
    </section>

    <!-- フッター -->
    <footer id="contact" class="pt-24 pb-12 relative border-t border-[#2a2315] bg-[#0c0c0c] z-10">
        <div class="container mx-auto px-6 text-center">
            <div class="text-4xl font-bold tracking-[0.2em] text-gold mb-8 opacity-80 font-en">FHW</div>
            
            <p class="text-gray-700 text-[10px] tracking-[0.2em] font-en">&copy; FHW / brewed by sake power. 🍶</p>
        </div>
    </footer>

    <!-- スクリプト -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- シェアメニューの開閉処理 ---
            const shareBtns = document.querySelectorAll('.share-btn');
            const allMenus = document.querySelectorAll('.share-menu');

            shareBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const menu = btn.nextElementSibling;
                    
                    allMenus.forEach(m => {
                        if (m !== menu) m.classList.add('hidden');
                    });
                    menu.classList.toggle('hidden');
                });
            });

            document.addEventListener('click', () => {
                allMenus.forEach(menu => {
                    menu.classList.add('hidden');
                });
            });

            // --- コピーリンクの偽物アクション ---
            const copyBtns = document.querySelectorAll('.copy-link-btn');
            copyBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    
                    const iconSpan = btn.querySelector('.icon');
                    const textSpan = btn.querySelector('.text');
                    
                    const originalIcon = iconSpan.innerHTML;
                    const originalText = textSpan.innerHTML;
                    
                    // Copied!に変更
                    iconSpan.innerHTML = '🔗';
                    iconSpan.classList.add('text-[#C5A059]');
                    textSpan.innerHTML = 'Copied!';
                    textSpan.classList.add('text-[#C5A059]', 'font-bold');
                    
                    // 2秒後に戻す
                    setTimeout(() => {
                        iconSpan.innerHTML = originalIcon;
                        iconSpan.classList.remove('text-[#C5A059]');
                        textSpan.innerHTML = originalText;
                        textSpan.classList.remove('text-[#C5A059]', 'font-bold');
                    }, 2000);
                });
            });

            // --- 金粉アニメーション (Canvas) ---
            const canvas = document.getElementById('gold-dust-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.reset();
                    this.y = Math.random() * height; 
                }
                reset() {
                    this.x = Math.random() * width;
                    this.y = height + Math.random() * 20;
                    this.size = Math.random() * 1.5 + 0.5;
                    const baseLightness = 50 + Math.random() * 30;
                    this.color = `hsla(45, 80%, ${baseLightness}%, ${Math.random() * 0.6 + 0.2})`;
                    this.speedY = -(Math.random() * 0.3 + 0.1); 
                    this.speedX = Math.random() * 0.2 - 0.1; 
                    this.angle = Math.random() * Math.PI * 2;
                    this.spin = (Math.random() - 0.5) * 0.05;
                    this.twinkleTimer = Math.random() * 100;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX + Math.sin(this.angle) * 0.3;
                    this.angle += this.spin;
                    this.twinkleTimer++;
                    if (this.y < -10) this.reset();
                    if (this.x < -10) this.x = width + 10;
                    if (this.x > width + 10) this.x = -10;
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size, this.size * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (Math.sin(this.twinkleTimer * 0.1) > 0.95) {
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = '#FDF4D2';
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size * 1.2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }

            const particleCount = Math.min(Math.floor(window.innerWidth / 8), 150);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();

            // --- スムーススクロール ---
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        const headerOffset = 60; 
                        const elementPosition = targetElement.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.scrollY - headerOffset;
                        
                        window.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });
                    }
                });
            });
            
            // --- ヘッダーのスクロール時の背景変更 ---
            const header = document.querySelector('header');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    header.style.background = 'rgba(10, 10, 10, 0.9)';
                    header.style.borderBottom = '1px solid rgba(197, 160, 89, 0.2)';
                } else {
                    header.style.background = 'rgba(15, 15, 15, 0.6)';
                    header.style.borderBottom = 'none';
                }
            });
        });
    </script>
</body>
