<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 基本設定：墨色背景 */
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #0c0c0c;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 英語用のフォント */
        .font-en {
            font-family: 'Oswald', sans-serif;
        }
        
        /* 金箔風グラデーションテキスト */
        .text-gold {
            background: linear-gradient(135deg, #C5A059 0%, #FDF4D2 25%, #C5A059 50%, #FDF4D2 75%, #A17B34 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 背景キャンバス */
        #gold-dust-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        /* すりガラス風パネル */
        .glass-panel {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(197, 160, 89, 0.15);
        }

        /* カード画像のホバーエフェクト用 */
        .card-image-container {
            overflow: hidden;
        }
        .card-image-container .bg-overlay {
            transition: all 0.7s ease;
        }
        .card:hover .card-image-container .bg-overlay {
            transform: scale(1.05);
            background-color: rgba(197, 160, 89, 0.2);
        }
        .card:hover .card-emoji {
            transform: scale(1.1);
            opacity: 1;
        }

        /* 全体の縦スクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0c0c0c; }
        ::-webkit-scrollbar-thumb { background: #5a4b2c; }
        ::-webkit-scrollbar-thumb:hover { background: #8b7345; }

        /* コレクション部分の横スクロールバーを非表示にする */
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

    <!-- スクリプト -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- JST 日本時間 カウントダウンタイマー処理（赤色発光・点滅ギミック追加） ---
            function updateCountdown() {
                const now = new Date();
                const jstOffset = 9 * 60 * 60 * 1000;
                const jstNow = new Date(now.getTime() + now.getTimezoneOffset() * 60000 + jstOffset);

                const jstTomorrow = new Date(jstNow);
                jstTomorrow.setHours(24, 0, 0, 0);

                let diff = jstTomorrow - jstNow;

                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                const pad = (num) => String(num).padStart(2, '0');

                // DOM要素の取得
                const hEl = document.getElementById('timer-h');
                const mEl = document.getElementById('timer-m');
                const sEl = document.getElementById('timer-s');
                const colons = document.querySelectorAll('.timer-colon');

                if (!hEl || !mEl || !sEl) return;

                // 時間をセット
                hEl.textContent = pad(h);
                mEl.textContent = pad(m);
                sEl.textContent = pad(s);

                // スタイルクラスの定義
                const normalClass = "text-[#E5D3B3] transition-colors duration-300";
                // 発光する赤色
                const redClass = "text-[#ff3b30] drop-shadow-[0_0_6px_rgba(255,59,48,0.8)] transition-colors duration-300";
                // 激しすぎない上品な点滅（pulse）＋発光する赤色
                const blinkClass = "animate-pulse text-[#ff3b30] drop-shadow-[0_0_8px_rgba(255,59,48,0.9)] transition-colors duration-300";

                // 一旦すべてノーマルクラスにリセット
                hEl.className = normalClass;
                mEl.className = normalClass;
                sEl.className = normalClass;
                colons.forEach(c => c.className = `timer-colon mx-0.5 sm:mx-1 ${normalClass}`);

                // カウントダウンギミックの判定
                if (h === 0) {
                    if (m < 10) {
                        // 残り10分未満（09:59〜00:00）：全体が赤く発光して点滅
                        hEl.className = blinkClass;
                        mEl.className = blinkClass;
                        sEl.className = blinkClass;
                        colons.forEach(c => c.className = `timer-colon mx-0.5 sm:mx-1 ${blinkClass}`);
                    } else if (m % 10 === 0) {
                        // 残り1時間未満で 50, 40, 30, 20, 10 分台の時：「分」だけ赤く発光
                        mEl.className = redClass;
                    }
                }
            }
            
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // --- シェアメニューの開閉処理 ---
            const shareBtns = document.querySelectorAll('.share-btn');
            const allMenus = document.querySelectorAll('.share-menu');

            shareBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const menu = btn.nextElementSibling;
                    
                    allMenus.forEach(m => {
                        if (m !== menu) m.classList.add('hidden');
                    });
                    menu.classList.toggle('hidden');
                });
            });

            document.addEventListener('click', () => {
                allMenus.forEach(menu => {
                    menu.classList.add('hidden');
                });
            });

            // --- コピーリンクのアクション ---
            const copyBtns = document.querySelectorAll('.copy-link-btn');
            copyBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    
                    const iconSpan = btn.querySelector('.icon');
                    const textSpan = btn.querySelector('.text');
                    
                    const originalIcon = iconSpan.innerHTML;
                    const originalText = textSpan.innerHTML;
                    
                    iconSpan.innerHTML = '🔗';
                    iconSpan.classList.add('text-[#C5A059]');
                    textSpan.innerHTML = 'Copied!';
                    textSpan.classList.add('text-[#C5A059]', 'font-bold');
                    
                    setTimeout(() => {
                        iconSpan.innerHTML = originalIcon;
                        iconSpan.classList.remove('text-[#C5A059]');
                        textSpan.innerHTML = originalText;
                        textSpan.classList.remove('text-[#C5A059]', 'font-bold');
                    }, 2000);
                });
            });

            // --- 金粉アニメーション (Canvas) ---
            const canvas = document.getElementById('gold-dust-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.reset();
                    this.y = Math.random() * height; 
                }
                reset() {
                    this.x = Math.random() * width;
                    this.y = height + Math.random() * 20;
                    this.size = Math.random() * 1.5 + 0.5;
                    const baseLightness = 50 + Math.random() * 30;
                    this.color = `hsla(45, 80%, ${baseLightness}%, ${Math.random() * 0.6 + 0.2})`;
                    this.speedY = -(Math.random() * 0.3 + 0.1); 
                    this.speedX = Math.random() * 0.2 - 0.1; 
                    this.angle = Math.random() * Math.PI * 2;
                    this.spin = (Math.random() - 0.5) * 0.05;
                    this.twinkleTimer = Math.random() * 100;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX + Math.sin(this.angle) * 0.3;
                    this.angle += this.spin;
                    this.twinkleTimer++;
                    if (this.y < -10) this.reset();
                    if (this.x < -10) this.x = width + 10;
                    if (this.x > width + 10) this.x = -10;
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size, this.size * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (Math.sin(this.twinkleTimer * 0.1) > 0.95) {
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = '#FDF4D2';
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size * 1.2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }

            const particleCount = Math.min(Math.floor(window.innerWidth / 8), 150);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();

            // --- スムーススクロール ---
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        const headerOffset = 60; 
                        const elementPosition = targetElement.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.scrollY - headerOffset;
                        
                        window.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });
                    }
                });
            });
            
            // --- ヘッダーのスクロール時の背景変更 ---
            const header = document.querySelector('header');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    header.style.background = 'rgba(10, 10, 10, 0.9)';
                    header.style.borderBottom = '1px solid rgba(197, 160, 89, 0.2)';
                } else {
                    header.style.background = 'rgba(15, 15, 15, 0.6)';
                    header.style.borderBottom = 'none';
                }
            });
        });
    </script>
</body>
</html>
