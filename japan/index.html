<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHW - FUNKYな日本</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 基本設定：墨色背景 */
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #0c0c0c;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 英語用のフォント */
        .font-en {
            font-family: 'Oswald', sans-serif;
        }
        
        /* 金箔風グラデーションテキスト */
        .text-gold {
            background: linear-gradient(135deg, #C5A059 0%, #FDF4D2 25%, #C5A059 50%, #FDF4D2 75%, #A17B34 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 背景キャンバス */
        #gold-dust-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        /* すりガラス風パネル */
        .glass-panel {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(197, 160, 89, 0.15);
        }

        /* カード画像のホバーエフェクト用 */
        .card-image-container {
            overflow: hidden;
        }
        
        /* 1枚目・2枚目用のホバー時ズーム */
        .zoom-on-hover:hover {
            transform: scale(1.05);
        }

        /* 3枚目（ガチャ）用のスタイル */
        .gacha-container {
            cursor: pointer;
        }
        
        /* ガチャ画像の初期状態（強いぼかしと暗転） */
        .gacha-image {
            filter: blur(15px) brightness(0.2);
            transition: filter 2s ease-in-out, transform 2s ease-in-out;
        }
        
        /* ガチャキャンバスの初期状態（透明） */
        .gacha-canvas {
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        /* ガチャ解放後のスタイル */
        .gacha-revealed .gacha-image {
            filter: blur(0px) brightness(1);
            transform: scale(1.05);
        }
        
        .gacha-revealed .gacha-canvas {
            opacity: 1;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0c0c0c; }
        ::-webkit-scrollbar-thumb { background: #5a4b2c; }
        ::-webkit-scrollbar-thumb:hover { background: #8b7345; }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

    <!-- スクリプト -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // --- 全カード共通：日替わり抽選ロジック ---
            // 各カードの画像リスト（今後ここに追加していけばOKです）
            const card1Images = [
                "sake.PNG",
                "ai.PNG" 
            ];
            
            const card2Images = [
                "kei.jpg"
                // 今後風景画像が増えたらここに追加
            ];
            
            const card3Images = [
                "Bronze.PNG",
                "Lime.PNG",
                "NAVY.PNG",
                "Rainbow.PNG",
                "cyan.PNG",
                "kin.PNG",
                "orange.PNG",
                "pink.PNG"
            ];

            // 今日の日付(JST)を取得してベースのシード文字列を作成
            const now = new Date();
            const jstOffset = 9 * 60 * 60 * 1000;
            const jstNow = new Date(now.getTime() + now.getTimezoneOffset() * 60000 + jstOffset);
            const dateStr = `${jstNow.getFullYear()}-${jstNow.getMonth() + 1}-${jstNow.getDate()}`;

            // ハッシュ計算関数（日付＋カード固有の文字列を混ぜて一意にする）
            function getDailyIndex(baseStr, salt, arrayLength) {
                let hash = 0;
                const str = baseStr + salt;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) - hash) + str.charCodeAt(i);
                    hash = hash & hash;
                }
                return Math.abs(hash) % arrayLength;
            }

            // 各カードの今日の画像を決定してセット
            const card1ImgEl = document.getElementById('card1-img');
            if (card1ImgEl && card1Images.length > 0) {
                card1ImgEl.src = card1Images[getDailyIndex(dateStr, "card1", card1Images.length)];
            }

            const card2ImgEl = document.getElementById('card2-img');
            if (card2ImgEl && card2Images.length > 0) {
                card2ImgEl.src = card2Images[getDailyIndex(dateStr, "card2", card2Images.length)];
            }

            const gachaImgEl = document.getElementById('gacha-result-img');
            if (gachaImgEl && card3Images.length > 0) {
                gachaImgEl.src = card3Images[getDailyIndex(dateStr, "card3", card3Images.length)];
            }


            // --- カード③のガチャ開示アクション ---
            const gachaBox = document.getElementById('gacha-box');
            let isRevealed = false; 

            if (gachaBox) {
                gachaBox.addEventListener('click', () => {
                    if (isRevealed) return;
                    
                    isRevealed = true;
                    gachaBox.style.cursor = 'default';

                    // 1秒間の「間（タメ）」のあとにクラス付与して演出開始
                    setTimeout(() => {
                        gachaBox.classList.add('gacha-revealed');
                    }, 1000);
                });
            }

            // --- JST 日本時間 カウントダウンタイマー処理 ---
            function updateCountdown() {
                const now = new Date();
                const jstOffset = 9 * 60 * 60 * 1000;
                const jstNow = new Date(now.getTime() + now.getTimezoneOffset() * 60000 + jstOffset);

                const jstTomorrow = new Date(jstNow);
                jstTomorrow.setHours(24, 0, 0, 0);

                let diff = jstTomorrow - jstNow;

                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                const pad = (num) => String(num).padStart(2, '0');

                const hEl = document.getElementById('timer-h');
                const mEl = document.getElementById('timer-m');
                const sEl = document.getElementById('timer-s');
                const colons = document.querySelectorAll('.timer-colon');

                if (!hEl || !mEl || !sEl) return;

                hEl.textContent = pad(h);
                mEl.textContent = pad(m);
                sEl.textContent = pad(s);

                const normalClass = "text-[#E5D3B3] transition-colors duration-300";
                const redClass = "text-[#ff3b30] drop-shadow-[0_0_6px_rgba(255,59,48,0.8)] transition-colors duration-300";
                const blinkClass = "animate-pulse text-[#ff3b30] drop-shadow-[0_0_8px_rgba(255,59,48,0.9)] transition-colors duration-300";

                hEl.className = normalClass;
                mEl.className = normalClass;
                sEl.className = normalClass;
                colons.forEach(c => c.className = `timer-colon mx-0.5 sm:mx-1 ${normalClass}`);

                if (h === 0) {
                    if (m < 10) {
                        hEl.className = blinkClass;
                        mEl.className = blinkClass;
                        sEl.className = blinkClass;
                        colons.forEach(c => c.className = `timer-colon mx-0.5 sm:mx-1 ${blinkClass}`);
                    } else if (m % 10 === 0) {
                        mEl.className = redClass;
                    }
                }
            }
            
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // --- シェアメニューの開閉処理 ---
            const shareBtns = document.querySelectorAll('.share-btn');
            const allMenus = document.querySelectorAll('.share-menu');

            shareBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const menu = btn.nextElementSibling;
                    
                    allMenus.forEach(m => {
                        if (m !== menu) m.classList.add('hidden');
                    });
                    menu.classList.toggle('hidden');
                });
            });

            document.addEventListener('click', () => {
                allMenus.forEach(menu => {
                    menu.classList.add('hidden');
                });
            });

            // --- コピーリンクのアクション ---
            const copyBtns = document.querySelectorAll('.copy-link-btn');
            copyBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    
                    const iconSpan = btn.querySelector('.icon');
                    const textSpan = btn.querySelector('.text');
                    
                    const originalIcon = iconSpan.innerHTML;
                    const originalText = textSpan.innerHTML;
                    
                    iconSpan.innerHTML = '🔗';
                    iconSpan.classList.add('text-[#C5A059]');
                    textSpan.innerHTML = 'Copied!';
                    textSpan.classList.add('text-[#C5A059]', 'font-bold');
                    
                    setTimeout(() => {
                        iconSpan.innerHTML = originalIcon;
                        iconSpan.classList.remove('text-[#C5A059]');
                        textSpan.innerHTML = originalText;
                        textSpan.classList.remove('text-[#C5A059]', 'font-bold');
                    }, 2000);
                });
            });

            // --- 金粉アニメーション ---
            class Particle {
                constructor(w, h) {
                    this.w = w;
                    this.h = h;
                    this.reset();
                    this.y = Math.random() * this.h; 
                }
                reset() {
                    this.x = Math.random() * this.w;
                    this.y = this.h + Math.random() * 20;
                    this.size = Math.random() * 1.5 + 0.5;
                    const baseLightness = 50 + Math.random() * 30;
                    this.color = `hsla(45, 80%, ${baseLightness}%, ${Math.random() * 0.6 + 0.2})`;
                    this.speedY = -(Math.random() * 0.3 + 0.1); 
                    this.speedX = Math.random() * 0.2 - 0.1; 
                    this.angle = Math.random() * Math.PI * 2;
                    this.spin = (Math.random() - 0.5) * 0.05;
                    this.twinkleTimer = Math.random() * 100;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX + Math.sin(this.angle) * 0.3;
                    this.angle += this.spin;
                    this.twinkleTimer++;
                    if (this.y < -10) this.reset();
                    if (this.x < -10) this.x = this.w + 10;
                    if (this.x > this.w + 10) this.x = -10;
                }
                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size, this.size * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (Math.sin(this.twinkleTimer * 0.1) > 0.95) {
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = '#FDF4D2';
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size * 1.2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }

            class DustCanvas {
                constructor(canvas, isCard = false) {
                    this.canvas = canvas;
                    this.ctx = canvas.getContext('2d');
                    this.particles = [];
                    this.isCard = isCard;
                    this.resize();
                }
                resize() {
                    let width, height, density;
                    if (!this.isCard) {
                        width = window.innerWidth;
                        height = window.innerHeight;
                        density = 8;
                    } else {
                        const rect = this.canvas.parentElement.getBoundingClientRect();
                        width = rect.width || 300;
                        height = rect.height || 300;
                        density = 15; 
                    }
                    
                    this.canvas.width = width;
                    this.canvas.height = height;
                    
                    const maxParticles = this.isCard ? 40 : 150;
                    const count = Math.min(Math.floor(width / density), maxParticles);
                    
                    this.particles = [];
                    for (let i = 0; i < count; i++) {
                        this.particles.push(new Particle(width, height));
                    }
                }
                render() {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    this.particles.forEach(p => {
                        p.update();
                        p.draw(this.ctx);
                    });
                }
            }

            const canvasInstances = [];
            
            const bgCanvas = document.getElementById('gold-dust-canvas');
            if (bgCanvas) canvasInstances.push(new DustCanvas(bgCanvas, false));
            
            document.querySelectorAll('.card-dust-canvas').forEach(c => {
                canvasInstances.push(new DustCanvas(c, true));
            });

            window.addEventListener('resize', () => {
                canvasInstances.forEach(c => c.resize());
            });

            function animate() {
                canvasInstances.forEach(c => c.render());
                requestAnimationFrame(animate);
            }
            animate();

            // --- スムーススクロール ---
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        const headerOffset = 60; 
                        const elementPosition = targetElement.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.scrollY - headerOffset;
                        
                        window.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });
                    }
                });
            });
            
            // --- ヘッダーのスクロール時の背景変更 ---
            const header = document.querySelector('header');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    header.style.background = 'rgba(10, 10, 10, 0.9)';
                    header.style.borderBottom = '1px solid rgba(197, 160, 89, 0.2)';
                } else {
                    header.style.background = 'rgba(15, 15, 15, 0.6)';
                    header.style.borderBottom = 'none';
                }
            });
        });
    </script>
</body>
</html>
