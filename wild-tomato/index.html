<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FHW WILD ZONE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
<style>
    /* === 1. 全体設定 & CSS変数 === */
    :root {
        --c-black: #000000;
        --c-cyan: #00ffff; --rgb-cyan: 0, 255, 255;
        --c-lime: #ccff00; --rgb-lime: 204, 255, 0;
        --c-pink: #ff00ff; --rgb-pink: 255, 0, 255;
        --c-white: #ffffff; --rgb-white: 255, 255, 255;
        --c-gray: #888888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: #222222; color: var(--c-white); font-family: "Helvetica Neue", Arial, sans-serif;
        overflow: hidden; overscroll-behavior: none; touch-action: none; user-select: none; -webkit-user-select: none;
    }
    .map-layer { position: absolute; top: 0; left: 0; width: 3000px; height: 3000px; transform-origin: 0 0; will-change: transform; }

    /* === 2. 背景・フラフープ === */
    #map-bg { z-index: 10; pointer-events: auto; }
    #border-wrapper {
        position: absolute; top: 50%; left: 50%; width: 2000px; height: 2000px; transform: translate(-50%, -50%); border-radius: 50%;
        box-shadow: 0 0 80px rgba(0, 255, 255, 0.1), 0 0 80px rgba(255, 0, 255, 0.1);
    }
    .ring-gradient {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
        background: conic-gradient(var(--c-cyan), var(--c-lime), var(--c-pink), var(--c-cyan), var(--c-lime), var(--c-pink), var(--c-cyan));
        animation: spinRing 60s linear infinite;
    }
    .ring-inner { position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px; background-color: var(--c-black); border-radius: 50%; }
    @keyframes spinRing { 100% { transform: rotate(360deg); } }

    /* === 3. タイトル UI === */
    #ui-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 20; }
    .neon-title-base {
        position: absolute; left: 50%; font-family: 'Black Ops One', cursive; font-weight: normal; 
        text-align: center; line-height: 1.0; letter-spacing: 2px; color: var(--c-black); width: 100%;
    }
    .title-top { top: 80px; transform: translateX(-50%); }
    .title-center { top: 50%; transform: translate(-50%, -50%); }
    .c-cyan { text-shadow: 0 0 4px var(--c-cyan), 0 0 8px var(--c-cyan), 0 0 12px var(--c-cyan); }
    .c-lime { text-shadow: 0 0 4px var(--c-lime), 0 0 8px var(--c-lime), 0 0 12px var(--c-lime); }
    .c-pink { text-shadow: 0 0 4px var(--c-pink), 0 0 8px var(--c-pink), 0 0 12px var(--c-pink); }
    .c-gray { text-shadow: 0 0 4px var(--c-gray), 0 0 8px var(--c-gray), 0 0 12px var(--c-gray); }
    .title-top span { font-size: min(28vw, 150px); }
    .title-center span { display: block; margin-top: 10px; font-size: min(24vw, 130px); }

    /* === 4. メダル・絵文字・特殊画像・スパーク === */
    #map-fg { z-index: 30; pointer-events: none; }
    .spark { position: absolute; pointer-events: none; z-index: 50; }
    .spark-inner { position: absolute; transform: translate(-50%, -50%) rotate(20deg); animation: sparkAnim 0.3s ease-out forwards; }
    .spark-inner::before, .spark-inner::after {
        content: ''; position: absolute; top: 50%; left: 50%; background-color: var(--c-white);
        box-shadow: 0 0 5px var(--c-white), 0 0 10px var(--c-cyan); transform: translate(-50%, -50%); border-radius: 50%;
    }
    .spark-inner::before { width: 3px; height: 30px; } .spark-inner::after { width: 30px; height: 3px; }
    @keyframes sparkAnim {
        0% { transform: translate(-50%, -50%) rotate(20deg) scale(0); opacity: 1; }
        30% { transform: translate(-50%, -50%) rotate(20deg) scale(1.2); opacity: 1; }
        100% { transform: translate(-50%, -50%) rotate(20deg) scale(0); opacity: 0; }
    }

    .emoji-item { position: absolute; display: flex; justify-content: center; align-items: center; font-size: 80px; transform: translate(-50%, -50%); pointer-events: none; will-change: left, top; z-index: 25; }
    .sp-img-item { position: absolute; display: flex; justify-content: center; align-items: center; width: 90px; height: 90px; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; will-change: left, top; z-index: 25; }
    .sp-img-item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    
    .medal {
        position: absolute; border-radius: 50%; background-color: var(--c-black); border: 3px solid var(--c-white); box-shadow: 0 0 10px var(--c-white), inset 0 0 10px var(--c-white);
        display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Black Ops One', cursive; color: var(--c-black); 
        transform: translate(-50%, -50%) scale(1); transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; animation: pulse 3s infinite alternate; pointer-events: auto; will-change: left, top;
    }
    .medal-image { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; pointer-events: none; }

    .medal.size-small { width: 70px; height: 70px; font-size: 36px; } .medal.size-small span { margin-top: 3px; margin-left: 1px; }
    .medal.size-normal { width: 100px; height: 100px; font-size: 54px; } .medal.size-normal span { margin-top: 4px; margin-left: 2px; }
    .medal.size-large { width: 140px; height: 140px; font-size: 76px; } .medal.size-large span { margin-top: 6px; margin-left: 3px; }
    .medal.size-huge { width: 200px; height: 200px; font-size: 108px; } .medal.size-huge span { margin-top: 10px; margin-left: 5px; }

    .medal.color-cyan span { text-shadow: 0 0 2px var(--c-cyan), 0 0 4px var(--c-cyan), 0 0 6px var(--c-cyan), 0 0 8px var(--c-cyan); }
    .medal.color-lime span { text-shadow: 0 0 2px var(--c-lime), 0 0 4px var(--c-lime), 0 0 6px var(--c-lime), 0 0 8px var(--c-lime); }
    .medal.color-pink span { text-shadow: 0 0 2px var(--c-pink), 0 0 4px var(--c-pink), 0 0 6px var(--c-pink), 0 0 8px var(--c-pink); }

    @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px var(--c-white), inset 0 0 5px var(--c-white); opacity: 0.8; } 50% { box-shadow: 0 0 15px var(--c-white), inset 0 0 12px var(--c-white); opacity: 1; } }

    .medal.color-cyan.shaking { border-color: var(--c-lime) !important; box-shadow: 0 0 25px var(--c-lime), inset 0 0 25px var(--c-lime) !important; z-index: 40; }
    .medal.color-lime.shaking { border-color: var(--c-pink) !important; box-shadow: 0 0 25px var(--c-pink), inset 0 0 25px var(--c-pink) !important; z-index: 40; }
    .medal.color-pink.shaking { border-color: var(--c-cyan) !important; box-shadow: 0 0 25px var(--c-cyan), inset 0 0 25px var(--c-cyan) !important; z-index: 40; }

    .medal.shake-pattern-1.shaking { animation: shakeAnim1 0.1s infinite !important; }
    .medal.shake-pattern-2.shaking { animation: shakeAnim2 0.15s infinite !important; }
    .medal.shake-pattern-3.shaking { animation: shakeAnim3 0.2s infinite !important; }
    @keyframes shakeAnim1 { 0%, 100% { transform: translate(calc(-50% + 4px), calc(-50% + 4px)) scale(1.15); } 25% { transform: translate(calc(-50% - 4px), calc(-50% + 4px)) scale(1.15); } 50% { transform: translate(calc(-50% - 4px), calc(-50% - 4px)) scale(1.15); } 75% { transform: translate(calc(-50% + 4px), calc(-50% - 4px)) scale(1.15); } }
    @keyframes shakeAnim2 { 0%, 100% { transform: translate(calc(-50% - 15px), -50%) scale(1.15); } 50% { transform: translate(calc(-50% + 15px), -50%) scale(1.15); } }
    @keyframes shakeAnim3 { 0%, 100% { transform: translate(-50%, -50%) scale(1.2) rotate(-15deg); } 50% { transform: translate(-50%, -50%) scale(0.9) rotate(15deg); } }

    /* === 5. モーダル (ポップアップ) === */
    #modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 1; transition: opacity 0.3s ease; }
    #modal-overlay.hidden { opacity: 0; pointer-events: none; }
    #modal-content {
        background-color: var(--c-black); border: 2px solid var(--c-white); box-shadow: 0 0 20px rgba(255, 255, 255, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.2);
        border-radius: 16px; transform: scale(1); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; justify-content: center; 
    }
    #modal-content.is-badge-mode { width: 90vw; max-width: 400px; height: 85vh; max-height: 700px; padding: 20px; justify-content: flex-start; }
    #modal-overlay.hidden #modal-content { transform: scale(0.8); }

    #modal-type-mystery { display: flex; justify-content: center; align-items: center; padding: 50px 80px; }
    .modal-text-mystery { font-family: 'Black Ops One', cursive; color: var(--c-black); font-size: 48px; letter-spacing: 8px; text-align: center; }
    #modal-type-badge { display: flex; flex-direction: column; height: 100%; }
    #modal-type-mystery.hidden, #modal-type-badge.hidden { display: none !important; }

    .modal-image-area { flex: 1; min-height: 0; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
    .modal-image-area img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 50%; box-shadow: 0 0 30px rgba(255, 255, 255, 0.3); }
    .modal-info-area { text-align: center; margin-bottom: 20px; font-family: 'Black Ops One', cursive; color: var(--c-black); }
    .modal-info-title { font-size: 24px; letter-spacing: 2px; margin-bottom: 4px; }
    .modal-info-subtitle { font-size: 32px; letter-spacing: 4px; margin-bottom: 10px; }
    .modal-info-desc { font-family: "Helvetica Neue", Arial, sans-serif; color: var(--c-white); font-size: 14px; font-weight: bold; letter-spacing: 1px; }

    .modal-action-area { display: flex; flex-direction: column; gap: 10px; }
    .modal-btn {
        background-color: var(--c-black); border: 2px solid; border-radius: 8px; padding: 14px; font-family: 'Black Ops One', cursive; 
        font-size: 16px; letter-spacing: 1px; color: var(--c-white); cursor: pointer; transition: all 0.2s ease;
    }

    .modal-theme-cyan .modal-text-mystery, .modal-theme-cyan .modal-info-title, .modal-theme-cyan .modal-info-subtitle { text-shadow: 0 0 2px var(--c-cyan), 0 0 5px var(--c-cyan), 0 0 10px var(--c-cyan); }
    .modal-theme-cyan .modal-btn { border-color: var(--c-cyan); box-shadow: 0 0 10px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.3); text-shadow: 0 0 5px var(--c-cyan); }
    .modal-theme-cyan .modal-btn:active { background-color: rgba(0, 255, 255, 0.2); }

    .modal-theme-lime .modal-text-mystery, .modal-theme-lime .modal-info-title, .modal-theme-lime .modal-info-subtitle { text-shadow: 0 0 2px var(--c-lime), 0 0 5px var(--c-lime), 0 0 10px var(--c-lime); }
    .modal-theme-lime .modal-btn { border-color: var(--c-lime); box-shadow: 0 0 10px rgba(204, 255, 0, 0.3), inset 0 0 10px rgba(204, 255, 0, 0.3); text-shadow: 0 0 5px var(--c-lime); }
    .modal-theme-lime .modal-btn:active { background-color: rgba(204, 255, 0, 0.2); }

    .modal-theme-pink .modal-text-mystery { text-shadow: 0 0 2px var(--c-pink), 0 0 5px var(--c-pink), 0 0 10px var(--c-pink); }
    
    .modal-theme-white .modal-text-mystery, .modal-theme-white .modal-info-title, .modal-theme-white .modal-info-subtitle { text-shadow: 0 0 2px var(--c-white), 0 0 5px var(--c-white), 0 0 10px var(--c-white); }
    .modal-theme-white .modal-btn { border-color: var(--c-white); box-shadow: 0 0 10px rgba(255, 255, 255, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.3); text-shadow: 0 0 5px var(--c-white); }
    .modal-theme-white .modal-btn:active { background-color: rgba(255, 255, 255, 0.2); }

    /* === 6. トランジション === */
    #transition-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--c-black); z-index: 200; display: flex; justify-content: center; align-items: center; opacity: 1; transition: opacity 0.3s ease; }
    #transition-overlay.hidden { opacity: 0; pointer-events: none; }
    #transition-text { font-family: 'Black Ops One', cursive; color: var(--c-white); font-size: 28px; text-align: center; white-space: pre-wrap; line-height: 1.5; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
</style>
</head>
<body>
    <div id="map-bg" class="map-layer"><div id="border-wrapper"><div class="ring-gradient"></div><div class="ring-inner"></div></div></div>
    <div id="ui-layer">
        <div class="neon-title-base title-top"><span class="c-cyan">F</span><span class="c-lime">H</span><span class="c-pink">W</span></div>
        <div class="neon-title-base title-center"><span class="c-gray text-wild">WILD</span><span class="c-gray text-zone">ZONE</span></div>
    </div>
    <div id="map-fg" class="map-layer"></div>

    <div id="modal-overlay" class="hidden">
        <div id="modal-content">
            <div id="modal-type-mystery"><div class="modal-text-mystery">???</div></div>
            <div id="modal-type-badge" class="hidden">
                <div class="modal-image-area"><img id="badge-image" src="" alt="Badge"></div>
                <div class="modal-info-area"><div id="badge-title" class="modal-info-title"></div><div id="badge-subtitle" class="modal-info-subtitle"></div><div class="modal-info-desc">YOUR PRIZE IS OUT THERE.</div></div>
                <div class="modal-action-area"><button class="modal-btn" id="claim-btn">CLAIM YOUR PRIZE</button><button class="modal-btn" id="continue-btn">CONTINUE STORY</button><button class="modal-btn" id="modal-close-btn">CLOSE</button></div>
            </div>
        </div>
    </div>
    <div id="transition-overlay" class="hidden"><div id="transition-text"></div></div>

<script>
    const MAP_WIDTH = 3000, MAP_HEIGHT = 3000, CENTER_X = 1500, CENTER_Y = 1500, BORDER_RADIUS = 1000;
    const TOTAL_MEDALS = 63, EMOJI_LIST = ['🍙', '🍅', '🧅', '🫑'], TOTAL_EMOJIS = 16;
    let objectData = [], currentId = 1, curClaimUrl = '', curContinueUrl = '';
    let badgeOpenCount = 0;

    function findValidSpawnPosition(radius, titleRect) {
        let x, y, isValid = false, attempts = 0;
        const spawnMaxRadius = BORDER_RADIUS - radius - 10;
        while (!isValid && attempts < 3000) {
            const sr = spawnMaxRadius * Math.pow(Math.random(), 0.8), ang = Math.random() * Math.PI * 2;
            x = CENTER_X + sr * Math.cos(ang); y = CENTER_Y + sr * Math.sin(ang);
            if (x > titleRect.minX && x < titleRect.maxX && y > titleRect.minY && y < titleRect.maxY) { attempts++; continue; }
            isValid = true;
            for (const o of objectData) { if (Math.hypot(x - o.x, y - o.y) < radius + o.radius + 10) { isValid = false; break; } }
            attempts++;
        }
        return { x: Math.round(x), y: Math.round(y) };
    }

    function generateMapData() {
        const tRect = { minX: CENTER_X - 350, maxX: CENTER_X + 350, minY: CENTER_Y - 450, maxY: CENTER_Y + 150 };
        let cols = Array(21).fill('cyan').concat(Array(21).fill('lime'), Array(21).fill('pink'));
        let sizes = Array(47).fill('normal').concat(Array(13).fill('large'), ['small'], Array(2).fill('huge')).sort(() => Math.random() - 0.5);
        
        let mConfigs = cols.map((c, i) => ({ color: c, size: sizes[i], isFast: false, isStrong: false }));
        [0, 21, 42].forEach(o => { mConfigs[o + Math.floor(Math.random()*21)].isFast = true; mConfigs[o + Math.floor(Math.random()*21)].isStrong = true; });
        mConfigs.sort(() => Math.random() - 0.5);

        const rMap = { 'small': 35, 'normal': 50, 'large': 70, 'huge': 100 }, mMap = { 'small': 0.5, 'normal': 1, 'large': 2.5, 'huge': 6 };

        for (let i = 0; i < TOTAL_MEDALS; i++) {
            let c = mConfigs[i], r = rMap[c.size], m = c.isStrong ? mMap[c.size]*15 : mMap[c.size], spd = c.isFast ? 2+Math.random() : 0.3+Math.random()*0.4, ang = Math.random()*Math.PI*2, pos = findValidSpawnPosition(r, tRect);
            objectData.push({ type: 'medal', id: currentId++, x: pos.x, y: pos.y, color: c.color, sizeClass: c.size, radius: r, mass: m, invMass: 1/m, baseSpeed: spd, angle: ang, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, isFast: c.isFast, isEscaper: Math.random() < 0.2, shakePattern: Math.floor(Math.random()*3)+1, isCaught: false, isImage: false, badgeData: null, element: null });
        }

        for (let i = 0; i < TOTAL_EMOJIS; i++) {
            let spd = 0.4+Math.random()*0.5, ang = Math.random()*Math.PI*2, pos = findValidSpawnPosition(45, tRect);
            objectData.push({ type: 'emoji', id: currentId++, char: EMOJI_LIST[i%4], x: pos.x, y: pos.y, radius: 45, mass: 0.5, invMass: 2, baseSpeed: spd, angle: ang, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, isCaught: false, element: null });
        }

        // ★ 指定された画像を coin999.PNG に変更！
        ['001900.png', 'ura.PNG', 'ginn.PNG', 'coin999.PNG'].forEach(src => {
            let spd = 0.4+Math.random()*0.5, ang = Math.random()*Math.PI*2, pos = findValidSpawnPosition(45, tRect);
            objectData.push({ type: 'sp', id: currentId++, src: src, x: pos.x, y: pos.y, radius: 45, mass: 0.5, invMass: 2, baseSpeed: spd, normalSpd: spd, angle: ang, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, isCaught: false, triggered: false, bounceCount: 0, isPaused: false, element: null });
        });

        const evos = [
            { url: '01BADGE.PNG', title: 'AICHI ★ 01', subtitle: 'MISO KATSU', claimUrl: 'https://funkyhotdog.com/wild-tomato', continueUrl: 'https://funkyhotdog.com/comic/japan-gp/aichi-01' },
            { url: 'gume.PNG', title: 'GUNMA ★ 02', subtitle: 'DARUMA', claimUrl: 'https://funkyhotdog.com/wild-tomato', continueUrl: 'https://funkyhotdog.com/comic/japan-gp/gunma-02' },
            { url: '03BADGE.PNG', title: 'HIROSHIMA ★ 03', subtitle: 'SECRET', claimUrl: 'https://funkyhotdog.com/wild-tomato', continueUrl: 'https://funkyhotdog.com/comic/japan-gp/hiroshima-03' }
        ];
        let nCand = objectData.filter(o => o.type === 'medal' && o.sizeClass === 'normal' && !o.isEscaper);
        evos.forEach(evo => {
            if(nCand.length > 0) {
                let luckyOne = nCand.splice(Math.floor(Math.random() * nCand.length), 1)[0];
                luckyOne.isImage = true; luckyOne.badgeData = evo;
            }
        });
    }

    function initDOM() {
        const fg = document.getElementById('map-fg'), frag = document.createDocumentFragment();
        objectData.forEach(o => {
            let el = document.createElement('div'); el.dataset.id = o.id;
            if(o.type === 'medal') {
                el.className = `medal color-${o.color} size-${o.sizeClass} shake-pattern-${o.shakePattern}`;
                el.innerHTML = o.isImage ? `<img src="${o.badgeData.url}" class="medal-image">` : '<span>?</span>';
                el.style.animationDelay = `${Math.random()*3}s`;
            } else if(o.type === 'emoji') {
                el.className = 'emoji-item'; el.textContent = o.char;
                if(o.char === '🍙') { el.style.pointerEvents = 'auto'; el.style.cursor = 'pointer'; }
            } else if(o.type === 'sp') {
                el.className = 'sp-img-item'; el.innerHTML = `<img src="${o.src}">`;
            }
            el.style.left = `${o.x}px`; el.style.top = `${o.y}px`;
            o.element = el; frag.appendChild(el);
        });
        fg.appendChild(frag);
    }

    function checkSpBounce(o) {
        if (o.type === 'sp' && o.bounceCount > 0) {
            if (--o.bounceCount <= 0) {
                o.baseSpeed = o.normalSpd; o.vx = Math.cos(o.angle) * o.baseSpeed; o.vy = Math.sin(o.angle) * o.baseSpeed; o.triggered = false; 
            }
        }
    }

    function animateObjects() {
        objectData.forEach(m => {
            if (m.isCaught) return;
            if (!m.isPaused) {
                m.angle += (Math.random() - 0.5) * (m.isFast ? 0.15 : 0.08);
                m.vx += (Math.cos(m.angle) * m.baseSpeed - m.vx) * 0.05; m.vy += (Math.sin(m.angle) * m.baseSpeed - m.vy) * 0.05;
            } else { m.vx = 0; m.vy = 0; }
            
            m.x += m.vx; m.y += m.vy;
            let dx = m.x - CENTER_X, dy = m.y - CENTER_Y, dist = Math.hypot(dx, dy);
            
            if (dist + m.radius > BORDER_RADIUS) {
                let over = dist + m.radius - BORDER_RADIUS, nx = dx/dist, ny = dy/dist;
                m.x -= nx * over; m.y -= ny * over;
                let dot = m.vx * nx + m.vy * ny;
                m.vx -= 2 * dot * nx; m.vy -= 2 * dot * ny; m.angle = Math.atan2(m.vy, m.vx);
                
                let s = document.createElement('div'); s.className = 'spark'; s.style.left = `${CENTER_X + nx*BORDER_RADIUS}px`; s.style.top = `${CENTER_Y + ny*BORDER_RADIUS}px`;
                s.innerHTML = '<div class="spark-inner"></div>'; document.getElementById('map-fg').appendChild(s);
                s.firstChild.addEventListener('animationend', () => s.remove());
                checkSpBounce(m);
            }
        });

        for (let i = 0; i < objectData.length; i++) {
            for (let j = i + 1; j < objectData.length; j++) {
                let o1 = objectData[i], o2 = objectData[j];
                if (o1.isCaught || o2.isCaught) continue;
                let dx = o2.x - o1.x, dy = o2.y - o1.y, distSq = dx*dx + dy*dy, cDist = o1.radius + o2.radius + 2; 
                if (distSq < cDist*cDist) {
                    let d = Math.sqrt(distSq) || 1, nx = dx/d, ny = dy/d, over = cDist - d, sum = o1.invMass + o2.invMass;
                    o1.x -= nx * over * (o1.invMass/sum); o1.y -= ny * over * (o1.invMass/sum);
                    o2.x += nx * over * (o2.invMass/sum); o2.y += ny * over * (o2.invMass/sum);
                    let dot = nx*(o2.vx-o1.vx) + ny*(o2.vy-o1.vy);
                    if (dot < 0) {
                        let imp = -1.8 * dot / sum, ix = nx*imp, iy = ny*imp;
                        o1.vx -= ix*o1.invMass; o1.vy -= iy*o1.invMass; o2.vx += ix*o2.invMass; o2.vy += iy*o2.invMass;
                        o1.angle = Math.atan2(o1.vy, o1.vx); o2.angle = Math.atan2(o2.vy, o2.vx);
                        checkSpBounce(o1); checkSpBounce(o2);
                    }
                }
            }
            objectData[i].element.style.left = `${objectData[i].x}px`; objectData[i].element.style.top = `${objectData[i].y}px`;
        }
        requestAnimationFrame(animateObjects);
    }

    let isDragging = false, hasMoved = false, startX = 0, startY = 0, initialTx = 0, initialTy = 0, currentTx = 0, currentTy = 0;
    const mapBg = document.getElementById('map-bg'), mapFg = document.getElementById('map-fg');
    const updateTransform = () => { mapBg.style.transform = mapFg.style.transform = `translate3d(${currentTx}px, ${currentTy}px, 0)`; };
    currentTx = innerWidth/2 - CENTER_X; currentTy = innerHeight/2 - CENTER_Y; updateTransform();

    window.addEventListener('pointerdown', e => {
        if(!document.getElementById('modal-overlay').classList.contains('hidden') || !document.getElementById('transition-overlay').classList.contains('hidden')) return;
        isDragging = true; hasMoved = false; startX = e.clientX; startY = e.clientY; initialTx = currentTx; initialTy = currentTy;
    });
    window.addEventListener('pointermove', e => {
        if(!isDragging) return;
        let dx = e.clientX - startX, dy = e.clientY - startY;
        if(Math.hypot(dx, dy) > 5) hasMoved = true;
        let tX = initialTx + dx, tY = initialTy + dy, vX = innerWidth/2 - tX, vY = innerHeight/2 - tY;
        let dist = Math.hypot(vX - CENTER_X, vY - CENTER_Y), maxD = Math.max(0, BORDER_RADIUS - Math.min(innerWidth, innerHeight)/2 + 50);
        if(dist > maxD) {
            vX = CENTER_X + (vX - CENTER_X) * (maxD/dist); vY = CENTER_Y + (vY - CENTER_Y) * (maxD/dist);
            tX = innerWidth/2 - vX; tY = innerHeight/2 - vY;
        }
        currentTx = tX; currentTy = tY; updateTransform();
    });
    window.addEventListener('pointerup', e => {
        if(!isDragging) return; isDragging = false;
        if(!hasMoved) {
            let tM = e.target.closest('.medal'), tE = e.target.closest('.emoji-item'), tS = e.target.closest('.sp-img-item');
            if(tM) handleMedalTap(tM);
            if(tE && tE.textContent === '🍙') window.location.href = 'https://funkyhotdog.com/world';
            if(tS) handleSpTap(tS); 
        }
    });

    const mOvl = document.getElementById('modal-overlay'), mCnt = document.getElementById('modal-content');
    const tMys = document.getElementById('modal-type-mystery'), tBdg = document.getElementById('modal-type-badge');

    function handleMedalTap(el) {
        let o = objectData.find(item => item.id == el.dataset.id && item.type === 'medal');
        if (!o || o.isCaught) return;
        o.isCaught = true; el.classList.add('shaking');
        setTimeout(() => {
            el.classList.remove('shaking');
            if (o.isEscaper) {
                o.isCaught = false; o.baseSpeed = 15; o.angle = Math.random()*Math.PI*2; o.vx = Math.cos(o.angle)*o.baseSpeed; o.vy = Math.sin(o.angle)*o.baseSpeed;
                setTimeout(() => { o.baseSpeed = o.isFast ? 2+Math.random() : 0.3+Math.random()*0.4; }, 3000);
            } else {
                o.isCaught = false; mCnt.className = ''; 
                if (o.isImage) {
                    tMys.classList.add('hidden'); tBdg.classList.remove('hidden'); mCnt.classList.add('is-badge-mode');
                    document.getElementById('badge-image').src = o.badgeData.url;
                    document.getElementById('badge-title').textContent = o.badgeData.title;
                    document.getElementById('badge-subtitle').textContent = o.badgeData.subtitle;
                    curClaimUrl = o.badgeData.claimUrl; curContinueUrl = o.badgeData.continueUrl;
                    mCnt.classList.add(Math.random() < 0.5 ? 'modal-theme-cyan' : 'modal-theme-white');
                } else {
                    tMys.classList.remove('hidden'); tBdg.classList.add('hidden'); mCnt.classList.remove('is-badge-mode');
                    if (el.classList.contains('color-cyan')) mCnt.classList.add('modal-theme-cyan');
                    if (el.classList.contains('color-lime')) mCnt.classList.add('modal-theme-lime');
                    if (el.classList.contains('color-pink')) mCnt.classList.add('modal-theme-pink');
                }
                mOvl.classList.remove('hidden');
            }
        }, 800); 
    }

    function handleSpTap(el) {
        let o = objectData.find(item => item.id == el.dataset.id && item.type === 'sp');
        if (!o || o.triggered) return;
        o.triggered = true; o.isPaused = true; o.vx = 0; o.vy = 0;
        setTimeout(() => {
            o.isPaused = false; o.baseSpeed = 20; o.bounceCount = 3; o.angle = Math.random()*Math.PI*2;
            o.vx = Math.cos(o.angle)*o.baseSpeed; o.vy = Math.sin(o.angle)*o.baseSpeed;
        }, 1500);
    }

    const closeModal = () => mOvl.classList.add('hidden');
    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    mOvl.addEventListener('pointerdown', e => { if (e.target === mOvl) closeModal(); });

    const tOvl = document.getElementById('transition-overlay'), tTxt = document.getElementById('transition-text');
    document.getElementById('claim-btn').addEventListener('click', () => {
        closeModal(); tTxt.textContent = "YOUR PRIZE IS OUT THERE.\nGO FIND IT."; tOvl.classList.remove('hidden');
        setTimeout(() => window.location.href = curClaimUrl, 2000);
    });
    document.getElementById('continue-btn').addEventListener('click', () => {
        closeModal(); tTxt.textContent = "FOLLOW THE STORY."; tOvl.classList.remove('hidden');
        setTimeout(() => window.location.href = curContinueUrl, 2000);
    });

    generateMapData(); initDOM(); requestAnimationFrame(animateObjects);

</script>
</body>
</html>
